      method: Create linkable assets
      examples:
        - State of Web Design in India 2026 [Annual Report]
        - Free Website Audit Tool
        - Web Design Cost Calculator
        - digital strategy ROI Calculator
      expected: 2-3 natural backlinks/month
    2_guest_posting:
      method: AI writes, you review & pitch
      targets:
        - Marketing blogs in India
        - Small business resources
        - Startup publications
        - Tech blogs
      frequency: 2-3 guest posts/month
      automation: 60% (AI finds & writes, you send)
    3_local_partnerships:
      method: Partner with India business associations
      targets:
        - India Chamber of Commerce
        - Local startup hubs
        - Business networking groups
        - Industry associations
      expected: 1-2 backlinks/month
    4_broken_link_building:
      method: AI finds broken links, creates replacement
      automation: 90% (AI does heavy lifting)
      expected: 2-3 backlinks/month
    5_resource_pages:
      method: Get listed on 'best agencies' lists
      targets:
        - Design agency directories
        - Marketing service listings
        - B2B service platforms
      expected: 1-2 backlinks/month
