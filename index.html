<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FouriqTech — Next-Gen Digital Services</title>
  <!-- Preconnect for Google Fonts to eliminate render-blocking -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Fonts loaded as link (not CSS @import) — async, non-blocking -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" />
  <!-- Critical inline styles: black bg + stable scrollbar gutter to prevent CLS from overflow toggling -->
  <style>
    html {
      background: #000;
      /* Reserve scrollbar space so toggling overflow never shifts content */
      scrollbar-gutter: stable;
      scrollbar-width: none;
    }

    body {
      background: #000;
      margin: 0;
      /* Prevent scrollbar layout shift */
      overflow-y: scroll;
    }

    ::-webkit-scrollbar {
      width: 0;
      background: transparent;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
