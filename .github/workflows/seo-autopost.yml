name: Autonomous SEO Content Loop

on:
  schedule:
    # V4: Reduced to 1x/day (04:30 UTC = 10:00 AM IST) — quality over quantity
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  auto-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run SEO Master Agent Script
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS || secrets.GEMINI_API_KEY }}
        run: node .github/scripts/seo-auto-poster.mjs

      - name: Commit and Push Changes
        run: |
          git config --global user.name "FouriqTech AI Bot"
          git config --global user.email "ai@fouriqtech.com"
          
          git add src/data/blogPosts.ts fouriqtech-seo-config.yaml .github/publish_log.json .github/content_pipeline.json .github/knowledge_base/ public/sitemap.xml seo_research_temp.md || true
          
          # Check if there are actual changes before committing
          if git diff --staged --quiet; then
            echo "No new content was generated. Exiting."
            exit 0
          fi
          
          git commit -m "SEO V8: Autonomous content publish"
          git push origin main
