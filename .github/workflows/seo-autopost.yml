name: Autonomous SEO Content Loop

on:
  schedule:
    # Runs at 04:30 UTC = 10:00 AM IST on Mon, Wed, Fri
    - cron: '30 4 * * 1,3,5'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  auto-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run SEO Master Agent Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node .github/scripts/seo-auto-poster.mjs

      - name: Commit and Push Changes
        run: |
          git config --global user.name "FouriqTech AI Bot"
          git config --global user.email "ai@fouriqtech.com"
          
          git add src/data/blogPosts.ts
          
          # Check if there are actual changes before committing
          if git diff --staged --quiet; then
            echo "No new content was generated. Exiting loop."
            exit 0
          fi
          
          git commit -m "Auto-post: SEO Blog Content Generation"
          git push origin main
