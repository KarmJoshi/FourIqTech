name: Autonomous SEO Content Loop

on:
  schedule:
    # Runs at 04:30 UTC (10:00 AM IST) and 16:30 UTC (10:00 PM IST) EVERY DAY
    - cron: '30 4,16 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  auto-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run SEO Master Agent Script
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        run: node .github/scripts/seo-auto-poster.mjs

      - name: Commit and Push Changes
        run: |
          git config --global user.name "FouriqTech AI Bot"
          git config --global user.email "ai@fouriqtech.com"
          
          git add src/data/blogPosts.ts fouriqtech-seo-config.yaml
          
          # Check if there are actual changes before committing
          if git diff --staged --quiet; then
            echo "No new content was generated. Exiting loop."
            exit 0
          fi
          
          git commit -m "Auto-post: SEO Blog Content Generation"
          git push origin main
