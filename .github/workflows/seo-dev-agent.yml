name: Autonomous SEO Dev Queue
on:
  schedule:
    # Runs once a week on Sunday at 05:00 UTC
    - cron: '0 5 * * 0'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  queue-landing-page:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run SEO Dev Agent
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS || secrets.GEMINI_API_KEY }}
        run: node .github/scripts/seo-dev-agent.mjs

      - name: Commit task to queue
        run: |
          git config --global user.name "FouriqTech AI Dev Agent"
          git config --global user.email "ai@fouriqtech.com"
          
          git add .github/dev-tasks/queue.json fouriqtech-seo-config.yaml || true
          
          if git diff --staged --quiet; then
            echo "No new tasks queued."
            exit 0
          fi
          
          git commit -m "Auto-queue: New Service Landing Page Task"
          git push origin main
