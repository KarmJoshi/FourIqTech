name: Render Keep-Alive

on:
  schedule:
    - cron: '*/10 * * * *' # Run every 10 minutes to prevent Render free tier from sleeping
  workflow_dispatch: # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Pulse to Agency Engine
        run: |
          echo "Pinging Agency Backend at https://fouriqtech.onrender.com/health"
          curl -s -f https://fouriqtech.onrender.com/health || echo "⚠️ Backend is cold-starting or unreachable."
